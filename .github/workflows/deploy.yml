name: Deploy Frontend

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy to S3 + CloudFront
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install & Build
        env:
          VITE_ENVIRONMENT: production
          VITE_APP_NAME: WeddingCut
          VITE_AWS_REGION: eu-north-1
          VITE_COGNITO_USER_POOL_ID: eu-north-1_zEPFcP8zc
          VITE_COGNITO_CLIENT_ID: 6mp5u5f1tkfdudhabj7jdho7c2
          VITE_BACKEND_URL: ${{ vars.API_GATEWAY_URL }}
          VITE_ROLLBAR_TOKEN: ""
          VITE_GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          npm ci
          npm run build

      - name: Deploy to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: eu-north-1
        run: |
          aws s3 sync build s3://${{ vars.S3_BUCKET_NAME }} --delete

      - name: Invalidate CloudFront
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
